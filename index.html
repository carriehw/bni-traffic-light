<!doctype html><html lang="zh-HK"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BNI BINGO 紅黃綠燈平台</title><script src="vendor_xlsx.full.min.js"></script>
<style>
:root{--wine:#6f1737;--red:#db1835;--green:#26934a;--yellow:#e3b423;--black:#54545b;--ink:#201a1d;--muted:#746b70;--line:#e7dfe3;--bg:#f7f3f5}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"PingFang HK","Microsoft JhengHei",system-ui,sans-serif}button,input{font:inherit}header{background:#fff;border-bottom:3px solid var(--red);padding:10px 18px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:8}.logo{width:88px;height:66px;object-fit:contain;object-position:center;display:block;border-radius:4px}.brand b{display:block;font-size:18px}.brand span,.muted{font-size:12px;color:var(--muted)}.spacer{flex:1}.wrap{max-width:1050px;margin:auto;padding:18px}.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 8px #3810210b}.login{max-width:430px;margin:8vh auto}.login h1{font-size:25px;margin:0 0 5px}.field{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;margin:9px 0}.btn{border:0;background:var(--wine);color:#fff;padding:11px 15px;border-radius:10px;font-weight:750;cursor:pointer}.btn.light{background:#fff;color:var(--wine);border:1px solid var(--wine)}.wide{width:100%}.hide{display:none!important}.topline,.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.topline h2{margin:0;font-size:20px}.tabs{display:flex;gap:7px;margin-bottom:14px}.tab{background:#fff;color:var(--wine);border:1px solid var(--line)}.tab.on{background:var(--wine);color:#fff}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.kpi{text-align:center;color:#fff;border-radius:13px;padding:13px}.kpi strong{font-size:25px;display:block}.green{background:var(--green)}.yellow{background:var(--yellow);color:#514000}.red{background:var(--red)}.black{background:var(--black)}.search{padding:13px;border:1px solid var(--line);border-radius:12px;width:100%;font-size:16px}.member-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.member{border:1px solid var(--line);background:#fff;border-radius:13px;padding:13px;cursor:pointer;text-align:left}.member:hover{border-color:var(--wine)}.pill{display:inline-block;color:#fff;border-radius:20px;padding:3px 9px;font-size:12px;font-weight:800}.member .score{font-size:24px;font-weight:850;float:right}.delta.up{color:var(--green)}.delta.down{color:var(--red)}.detail-head{display:grid;grid-template-columns:auto 1fr;gap:15px;align-items:center}.score-ring{width:96px;height:96px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:31px;font-weight:900}.breakdown{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.metric{border:1px solid var(--line);border-radius:10px;padding:10px}.metric span{float:right;font-weight:850}.history{display:flex;gap:9px;overflow:auto}.month{min-width:150px;border:1px solid var(--line);border-radius:11px;padding:11px}.month strong{font-size:23px}.tips{padding-left:22px;line-height:1.7}.recap{white-space:pre-wrap;line-height:1.65;background:#fbf8fa;border:1px solid var(--line);padding:13px;border-radius:11px}.drop{border:2px dashed #cbbdc4;padding:22px;border-radius:13px;text-align:center;background:#fcfafb}.notice{padding:11px;border-radius:10px;background:#fff7dc;color:#725600;margin:10px 0}.ok{background:#e7f6ec;color:#176b32}.error{background:#fde8eb;color:#8b1125}.table-wrap{overflow:auto}table{border-collapse:collapse;width:100%;font-size:13px}th,td{padding:8px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}footer{text-align:center;color:var(--muted);font-size:11px;padding:18px}@media(max-width:700px){.wrap{padding:12px}.member-grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.breakdown{grid-template-columns:1fr}.brand span{display:none}.logo{width:66px;height:50px}.detail-head{grid-template-columns:1fr}.score-ring{width:82px;height:82px}}
.member-card-canvas{display:block;width:100%;max-width:720px;height:auto;margin:14px auto 0;border:1px solid var(--line);border-radius:12px;background:#fff}.card-actions{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:12px}
</style></head><body>
<header><img class="logo" src="bingo-logo.jpg"><div class="brand"><b>BNI BINGO 紅黃綠燈平台</b><span>會員月度表現、改善建議及分享圖卡</span></div><div class="spacer"></div><button id="logoutBtn" class="btn light hide">登出</button></header>
<main class="wrap">
<section id="loginView" class="card login"><h1>登入平台</h1><p class="muted">會員可以查看個人及分會表現；LT 可上載、檢查及發布每月 Excel 報告。</p><select id="role" class="field"><option value="member">會員登入</option><option value="admin">LT 管理員登入</option></select><input id="password" class="field" type="password" placeholder="請輸入密碼"><button id="loginBtn" class="btn wide">登入</button><div id="loginMsg"></div></section>
<section id="appView" class="hide"><div class="tabs"><button id="memberTab" class="btn tab on">會員平台</button><button id="adminTab" class="btn tab hide">LT 管理</button></div><section id="memberView"><div class="card"><div class="topline"><div><h2>分會表現總覽</h2><div id="period" class="muted"></div></div><div class="spacer"></div><div id="batchLabel" class="muted"></div></div><div id="kpis" class="kpis"></div></div><div class="card"><input id="search" class="search" placeholder="搜尋會員姓名"><div id="memberList" class="member-grid" style="margin-top:12px"></div></div><div id="detail" class="card hide"></div></section><section id="adminView" class="hide"><div class="card"><h2>上載及檢查 Excel</h2><div class="drop"><input id="file" type="file" accept=".xlsx,.xls"><p class="muted">系統會先做異常檢查，再由 LT 確認發布。</p></div><div id="checkResult"></div><div class="row" style="margin-top:12px"><button id="publishBtn" class="btn hide">確認發布</button><button id="downloadZipBtn" class="btn light hide">下載全部會員圖卡 ZIP</button><button id="downloadCsvBtn" class="btn light hide">下載 Manifest CSV</button></div></div><div id="preview" class="card hide"></div></section></section>
</main><footer>BNI BINGO Chapter · Traffic Light Performance Platform</footer><script src="vendor_jszip.min.js"></script><script>
const API='https://qyufbsvrophwzcwlkppv.supabase.co/functions/v1/bni-api';let token=localStorage.getItem('bni_token')||'',role=localStorage.getItem('bni_role')||'',data={batches:[],members:[]},currentReport=null,sourceBase64=null;
const $=id=>document.getElementById(id),color=l=>l==='green'?'#26934a':l==='yellow'?'#e3b423':l==='red'?'#db1835':'#54545b',label=l=>({green:'綠燈',yellow:'黃燈',red:'紅燈',black:'黑燈'})[l]||l,esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function api(action,body={}){const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json','x-bni-token':token},body:JSON.stringify({action,...body})});const j=await r.json();if(!r.ok)throw new Error(j.error||'操作失敗');return j}
$('loginBtn').onclick=async()=>{try{const r=await api('login',{role:$('role').value,password:$('password').value});token=r.token;role=r.role;localStorage.setItem('bni_token',token);localStorage.setItem('bni_role',role);await enter()}catch(e){$('loginMsg').innerHTML='<div class="notice error">'+esc(e.message)+'</div>'}};$('logoutBtn').onclick=async()=>{try{await api('logout')}catch{}localStorage.clear();location.reload()};
async function enter(){try{data=await api('history');$('loginView').classList.add('hide');$('appView').classList.remove('hide');$('logoutBtn').classList.remove('hide');if(role==='admin')$('adminTab').classList.remove('hide');renderOverview()}catch(e){localStorage.clear();token='';role='';$('loginMsg').innerHTML='<div class="notice error">'+esc(e.message)+'</div>'}}
$('memberTab').onclick=()=>{$('memberView').classList.remove('hide');$('adminView').classList.add('hide');$('memberTab').classList.add('on');$('adminTab').classList.remove('on')};$('adminTab').onclick=()=>{$('memberView').classList.add('hide');$('adminView').classList.remove('hide');$('adminTab').classList.add('on');$('memberTab').classList.remove('on')};
function renderOverview(){const b=data.batches[0],m=data.members.filter(x=>!b||x.batch_id===b.id);$('period').textContent=b?`${b.period_start} 至 ${b.period_end}`:'暫未有已發布報告';$('batchLabel').textContent=b?`${b.member_count} 位會員 · ${b.source_filename}`:'';const counts={green:0,yellow:0,red:0,black:0};m.forEach(x=>counts[x.light]=(counts[x.light]||0)+1);$('kpis').innerHTML=['green','yellow','red','black'].map(x=>`<div class="kpi ${x}"><strong>${counts[x]||0}</strong>${label(x)}</div>`).join('');window.latestMembers=m;renderList(m)}
function renderList(m){$('memberList').innerHTML=m.map((x,i)=>`<button class="member" onclick="showMember(${i})"><span class="score">${x.total_score}</span><b>${esc(x.member_name)}</b><br><span class="pill" style="background:${color(x.light)}">${label(x.light)}</span> ${deltaText(x)}</button>`).join('')||'<p class="muted">沒有會員紀錄</p>'}
$('search').oninput=e=>{const q=e.target.value.trim().toLowerCase();renderList((window.latestMembers||[]).filter(x=>String(x.member_name).toLowerCase().includes(q)))};function deltaText(x){const d=Number(x.total_score)-Number(x.previous_score||0);return `<span class="delta ${d>=0?'up':'down'}">${d>=0?'+':''}${d}</span>`}
function showMember(i){const x=(window.latestMembers||[])[i];if(!x)return;const hist=data.batches.map(b=>{const v=data.members.find(y=>y.batch_id===b.id&&y.member_name===x.member_name);return v?`<div class="month"><small>${b.period_end}</small><br><strong>${v.total_score}</strong><br><span class="pill" style="background:${color(v.light)}">${label(v.light)}</span></div>`:''}).join('');$('detail').classList.remove('hide');$('detail').innerHTML=`<div class="detail-head"><div class="score-ring" style="background:${color(x.light)}">${x.total_score}</div><div><h2>${esc(x.member_name)}</h2><span class="pill" style="background:${color(x.light)}">${label(x.light)}</span> ${deltaText(x)}</div></div><h3>分項表現</h3><div class="breakdown">${[['培訓',x.training_score],['缺席',x.absence_score],['遲到',x.lateness_score],['一對一',x.one_to_one_score],['引薦',x.referral_score],['生意額',x.biz_give_score],['嘉賓',x.visitor_score]].map(v=>`<div class="metric">${v[0]}<span>${v[1]||0}</span></div>`).join('')}</div><h3>每月比較</h3><div class="history">${hist}</div><h3>改善建議</h3><ul class="tips">${(x.improvement_tips||[]).map(t=>`<li>${esc(t)}</li>`).join('')||'<li>保持現有表現，持續建立高質素引薦習慣。</li>'}</ul><h3>本月回顧</h3><div class="recap">${esc(x.recap_text||'')}</div><canvas id="memberCard" class="member-card-canvas" width="1200" height="1500"></canvas><div class="card-actions"><button class="btn" onclick="downloadCurrentCard()">下載會員圖卡</button></div>`;drawCard(x);$('detail').scrollIntoView({behavior:'smooth'})}
function drawCard(x,canvas=$('memberCard')){if(!canvas)return;const ctx=canvas.getContext('2d'),bg=ctx.createLinearGradient(0,0,1200,1500);bg.addColorStop(0,'#fff');bg.addColorStop(1,'#f7eef2');ctx.fillStyle=bg;ctx.fillRect(0,0,1200,1500);ctx.fillStyle='#6f1737';ctx.fillRect(0,0,1200,180);ctx.fillStyle='#fff';ctx.font='bold 54px sans-serif';ctx.fillText('BNI BINGO 會員月度表現',70,105);ctx.fillStyle='#201a1d';ctx.font='bold 62px sans-serif';ctx.fillText(x.member_name,70,285);ctx.fillStyle=color(x.light);ctx.beginPath();ctx.arc(210,500,135,0,Math.PI*2);ctx.fill();ctx.fillStyle=x.light==='yellow'?'#514000':'#fff';ctx.textAlign='center';ctx.font='bold 100px sans-serif';ctx.fillText(x.total_score,210,535);ctx.font='bold 34px sans-serif';ctx.fillText(label(x.light),210,595);ctx.textAlign='left';ctx.fillStyle='#201a1d';ctx.font='bold 36px sans-serif';ctx.fillText('分項表現',430,400);ctx.font='30px sans-serif';const vals=[['培訓',x.training_score],['缺席',x.absence_score],['遲到',x.lateness_score],['一對一',x.one_to_one_score],['引薦',x.referral_score],['生意額',x.biz_give_score],['嘉賓',x.visitor_score]];vals.forEach((v,j)=>ctx.fillText(`${v[0]}：${v[1]||0}`,430,465+j*62));ctx.fillStyle='#6f1737';ctx.font='bold 38px sans-serif';ctx.fillText('改善建議',70,850);ctx.fillStyle='#201a1d';ctx.font='29px sans-serif';wrapLines(ctx,(x.improvement_tips||['保持現有表現，持續建立高質素引薦習慣。']).map(t=>'• '+t).join('\n'),70,910,1060,46);ctx.fillStyle='#6f1737';ctx.font='bold 38px sans-serif';ctx.fillText('本月回顧',70,1190);ctx.fillStyle='#201a1d';ctx.font='27px sans-serif';wrapLines(ctx,x.recap_text||'',70,1250,1060,42);ctx.fillStyle='#746b70';ctx.font='24px sans-serif';ctx.fillText('BNI BINGO Chapter · Traffic Light Performance Platform',70,1450)}
function wrapLines(ctx,text,x,y,max,line){for(const para of String(text).split('\n')){let row='';for(const ch of para){if(ctx.measureText(row+ch).width>max){ctx.fillText(row,x,y);y+=line;row=ch}else row+=ch}ctx.fillText(row,x,y);y+=line}return y}
function downloadCanvas(canvas,name){const a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download=name;a.click()}function safeName(s){return String(s).replace(/[\\/:*?"<>|]/g,'_')}function downloadCurrentCard(){const name=$('detail').querySelector('h2')?.textContent||'member';downloadCanvas($('memberCard'),safeName(name)+'-traffic-light.png')}
$('file').onchange=async e=>{const f=e.target.files[0];if(!f)return;currentReport=null;$('publishBtn').classList.add('hide');$('downloadZipBtn').classList.add('hide');$('downloadCsvBtn').classList.add('hide');try{sourceBase64=await fileBase64(f);const buf=await f.arrayBuffer(),wb=XLSX.read(buf,{type:'array',cellDates:true}),res=parseWorkbook(wb,f.name);currentReport=res.report;renderChecks(res);renderPreview(res.report);if(!res.errors.length)$('publishBtn').classList.remove('hide');$('downloadZipBtn').classList.remove('hide');$('downloadCsvBtn').classList.remove('hide')}catch(err){$('checkResult').innerHTML='<div class="notice error">'+esc(err.message)+'</div>'}};
function fileBase64(f){return new Promise((ok,no)=>{const r=new FileReader();r.onload=()=>ok(String(r.result).split(',')[1]);r.onerror=no;r.readAsDataURL(f)})}
function parseWorkbook(wb,name){const errors=[],warnings=[],sheet=wb.Sheets[wb.SheetNames[0]],rows=XLSX.utils.sheet_to_json(sheet,{defval:'',raw:false});if(!rows.length)errors.push('Excel 沒有可讀取的會員資料');const keys=rows.length?Object.keys(rows[0]):[],find=(terms)=>keys.find(k=>terms.some(t=>k.toLowerCase().includes(t)));const map={member_name:find(['member','會員','姓名','name']),total_score:find(['total','總分','score']),light:find(['light','燈']),training_score:find(['training','培訓']),absence_score:find(['absence','缺席']),lateness_score:find(['late','遲到']),one_to_one_score:find(['one to one','1-2-1','一對一']),referral_score:find(['referral','引薦']),biz_give_score:find(['biz','生意']),visitor_score:find(['visitor','嘉賓'])};if(!map.member_name)errors.push('找不到會員姓名欄');if(!map.total_score)errors.push('找不到總分欄');const members=rows.filter(r=>String(r[map.member_name]||'').trim()).map(r=>{const m={};for(const [k,v] of Object.entries(map))m[k]=v?r[v]:'';m.member_name=String(m.member_name).trim();['total_score','training_score','absence_score','lateness_score','one_to_one_score','referral_score','biz_give_score','visitor_score'].forEach(k=>m[k]=Number(String(m[k]||0).replace(/,/g,''))||0);m.light=normaliseLight(m.light,m.total_score);m.previous_score=0;m.improvement_tips=makeTips(m);m.recap_text=makeRecap(m);m.raw_metrics=r;return m});const dup=members.map(m=>m.member_name).filter((n,i,a)=>a.indexOf(n)!==i);if(dup.length)errors.push('重複會員姓名：'+[...new Set(dup)].join('、'));members.forEach(m=>{const sum=['training_score','absence_score','lateness_score','one_to_one_score','referral_score','biz_give_score','visitor_score'].reduce((n,k)=>n+m[k],0);if(sum!==m.total_score)warnings.push(`${m.member_name}：分項合計 ${sum}，Excel 總分 ${m.total_score}`);if(m.total_score<0||m.total_score>200)warnings.push(`${m.member_name}：總分 ${m.total_score} 可能異常`)});const dates=name.match(/(20\d{2})[-_ ]?(\d{1,2})/),end=dates?`${dates[1]}-${String(dates[2]).padStart(2,'0')}-28`:new Date().toISOString().slice(0,10),start=end.slice(0,8)+'01';return{errors,warnings,report:{period_start:start,period_end:end,source_filename:name,members}}}
function normaliseLight(v,s){v=String(v).toLowerCase();if(v.includes('綠')||v.includes('green'))return'green';if(v.includes('黃')||v.includes('yellow'))return'yellow';if(v.includes('紅')||v.includes('red'))return'red';if(v.includes('黑')||v.includes('black'))return'black';return s>=70?'green':s>=50?'yellow':s>=30?'red':'black'}function makeTips(m){const t=[];if(m.visitor_score<5)t.push('本月可以集中邀請一位合適嘉賓，為分會增加新商機。');if(m.referral_score<10)t.push('主動了解兩位會友的理想客戶，增加精準引薦機會。');if(m.one_to_one_score<5)t.push('安排一至兩次一對一，加深對會友業務及合作方向的認識。');if(m.training_score<5)t.push('完成一次培訓或重溫核心技巧，提升轉介及跟進效率。');return t.slice(0,3)}function makeRecap(m){return`${m.member_name} 本月總分為 ${m.total_score}，屬於${label(m.light)}表現。現時較值得優先提升的範疇包括引薦、嘉賓邀請及一對一交流。建議下月設定一至兩個清晰而容易執行的小目標，逐步累積成果。`}
function renderChecks(r){$('checkResult').innerHTML=(r.errors.length?'<div class="notice error"><b>不可發布：</b><br>'+r.errors.map(esc).join('<br>')+'</div>':'<div class="notice ok">基本欄位及會員資料檢查完成，可以發布。</div>')+(r.warnings.length?'<div class="notice"><b>需要 LT 留意：</b><br>'+r.warnings.slice(0,30).map(esc).join('<br>')+'</div>':'')}
function renderPreview(r){$('preview').classList.remove('hide');$('preview').innerHTML=`<h2>上載預覽</h2><div class="muted">${esc(r.source_filename)} · ${r.members.length} 位會員</div><div class="table-wrap"><table><thead><tr><th>會員</th><th>總分</th><th>燈號</th><th>分項合計</th></tr></thead><tbody>${r.members.map(m=>`<tr><td>${esc(m.member_name)}</td><td>${m.total_score}</td><td>${label(m.light)}</td><td>${['training_score','absence_score','lateness_score','one_to_one_score','referral_score','biz_give_score','visitor_score'].reduce((n,k)=>n+m[k],0)}</td></tr>`).join('')}</tbody></table></div>`}
$('publishBtn').onclick=async()=>{if(!currentReport)return;try{const r=await api('publish',{report:currentReport,source_file_base64:sourceBase64});$('checkResult').innerHTML='<div class="notice ok">已成功發布 '+r.member_count+' 位會員紀錄。</div>';data=await api('history');renderOverview()}catch(e){$('checkResult').innerHTML='<div class="notice error">'+esc(e.message)+'</div>'}};
$('downloadZipBtn').onclick=async()=>{if(!currentReport)return;const zip=new JSZip(),folder=zip.folder('member-cards'),manifest=[];for(const m of currentReport.members){const c=document.createElement('canvas');c.width=1200;c.height=1500;drawCard(m,c);const blob=await new Promise(ok=>c.toBlob(ok,'image/png'));const fn=safeName(m.member_name)+'-traffic-light.png';folder.file(fn,blob);manifest.push({member_name:m.member_name,total_score:m.total_score,light:label(m.light),filename:fn})}zip.file('manifest.csv',toCsv(manifest));const out=await zip.generateAsync({type:'blob'}),a=document.createElement('a');a.href=URL.createObjectURL(out);a.download='BNI-BINGO-member-cards.zip';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)};$('downloadCsvBtn').onclick=()=>{if(!currentReport)return;const rows=currentReport.members.map(m=>({會員:m.member_name,總分:m.total_score,燈號:label(m.light),檔案:safeName(m.member_name)+'-traffic-light.png'})),blob=new Blob(['\ufeff'+toCsv(rows)],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='member-card-manifest.csv';a.click()};function toCsv(rows){if(!rows.length)return'';const ks=Object.keys(rows[0]),q=v=>'"'+String(v??'').replace(/"/g,'""')+'"';return[ks.map(q).join(','),...rows.map(r=>ks.map(k=>q(r[k])).join(','))].join('\n')}
if(token)enter();
</script></body></html>
