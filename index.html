<!doctype html>
<html lang="zh-HK">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BNI BINGO 紅黃綠燈平台</title>
<script src="vendor_xlsx.full.min.js"></script>
<link rel="stylesheet" href="ux_enhancements.css?v=20260723e">
<link rel="stylesheet" href="password_toggle.css?v=20260723e">
<style>
:root{--wine:#761538;--red:#e31b36;--green:#27934a;--yellow:#e1b322;--black:#57575f;--ink:#211b1e;--muted:#766d72;--line:#eadfe4;--bg:#f8f4f6}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"PingFang HK","Microsoft JhengHei",system-ui,sans-serif}button,input,select{font:inherit}.hide{display:none!important}header{background:#fff;border-bottom:3px solid var(--red);padding:10px 18px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:8}.logo{width:88px;height:66px;object-fit:contain}.brand b{display:block;font-size:18px}.brand span,.muted{font-size:12px;color:var(--muted)}.spacer{flex:1}.wrap{max-width:1080px;margin:auto;padding:18px}.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px}.login{max-width:430px;margin:8vh auto}.field,.search{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;margin:8px 0}.btn{border:0;background:var(--wine);color:#fff;padding:11px 15px;border-radius:10px;font-weight:750;cursor:pointer}.btn.light{background:#fff;color:var(--wine);border:1px solid var(--wine)}.wide{width:100%}.tabs,.row,.topline{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.tab{background:#fff;color:var(--wine);border:1px solid var(--line)}.tab.on{background:var(--wine);color:#fff}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.kpi{text-align:center;color:#fff;border-radius:13px;padding:13px}.kpi strong{font-size:25px;display:block}.green{background:var(--green)}.yellow{background:var(--yellow);color:#514000}.red{background:var(--red)}.black{background:var(--black)}.member-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.member{border:1px solid var(--line);background:#fff;border-radius:13px;padding:13px;cursor:pointer;text-align:left}.member .score{font-size:24px;font-weight:850;float:right}.pill{display:inline-block;color:#fff;border-radius:20px;padding:3px 9px;font-size:12px;font-weight:800}.detail-head{display:grid;grid-template-columns:auto 1fr;gap:15px;align-items:center}.score-ring{width:96px;height:96px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:31px;font-weight:900}.breakdown{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.metric{border:1px solid var(--line);border-radius:10px;padding:10px}.metric span{float:right;font-weight:850}.score-note{font-size:12px;color:var(--muted);background:#fbf8fa;border-radius:9px;padding:9px;margin:8px 0}.history{display:flex;gap:9px;overflow:auto}.month{min-width:150px;border:1px solid var(--line);border-radius:11px;padding:11px}.notice{padding:11px;border-radius:10px;background:#fff7dc;color:#725600;margin:10px 0}.ok{background:#e7f6ec;color:#176b32}.error{background:#fde8eb;color:#8b1125}.info{background:#eef4ff;color:#244b82}.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.drop{border:2px dashed #cbbdc4;padding:22px;border-radius:13px;text-align:center}.table-wrap{overflow:auto}table{border-collapse:collapse;width:100%;font-size:13px}th,td{padding:8px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}.recap{white-space:pre-wrap;line-height:1.65;background:#fbf8fa;border:1px solid var(--line);padding:13px;border-radius:11px}footer{text-align:center;color:var(--muted);font-size:11px;padding:18px}@media(max-width:760px){header{padding:9px 12px}.logo{width:66px;height:50px}.brand span{display:none}.wrap{padding:12px}.member-grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.breakdown,.admin-grid{grid-template-columns:1fr}.detail-head{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><img class="logo" src="bingo-logo.jpg" alt="BNI BINGO"><div class="brand"><b>BNI BINGO 紅黃綠燈平台</b><span>會員月度表現、改善建議及分享圖卡</span></div><div class="spacer"></div><button id="logoutBtn" class="btn light hide">登出</button></header>
<main class="wrap">
<section id="loginView" class="card login"><h1>登入平台</h1><p class="muted">會員可查看個人及分會表現；LT 可上載、檢查及發布每月 Excel。</p><select id="role" class="field"><option value="member">會員登入</option><option value="admin">LT 管理員登入</option></select><div class="password-wrap"><input id="password" class="field" type="password" placeholder="請輸入密碼" autocomplete="current-password"><button id="togglePassword" class="password-toggle" type="button" aria-label="顯示密碼">顯示</button></div><button id="loginBtn" class="btn wide">登入</button><div id="loginMsg"></div></section>
<section id="appView" class="hide"><div class="tabs"><button id="memberTab" class="btn tab on">會員平台</button><button id="adminTab" class="btn tab hide">LT 管理</button></div>
<section id="memberView"><div class="card"><div class="topline"><div><h2>分會表現總覽</h2><div id="period" class="muted"></div></div><div class="spacer"></div><div id="batchLabel" class="muted"></div></div><div id="kpis" class="kpis"></div></div><div class="card"><input id="search" class="search" placeholder="搜尋會員姓名"><div id="memberList" class="member-grid"></div></div><div id="detail" class="card hide"></div></section>
<section id="adminView" class="hide"><div class="admin-grid"><div class="card"><h2>上載及檢查 Excel</h2><div class="drop"><input id="file" type="file" accept=".xlsx,.xls"><p class="muted">正式分數以 Excel 為準。</p></div><div id="checkResult"></div><div class="row"><button id="publishBtn" class="btn hide">確認發布</button><button id="resetBtn" class="btn light hide">取消上載</button></div></div><div class="card"><h2>會員月份表現變化</h2><select id="trendMember" class="field"><option value="">請選擇會員</option></select><div id="trendView"><p class="muted">請先選擇會員。</p></div></div></div><div id="preview" class="card hide"></div><div class="card"><h2>月份紀錄</h2><div id="batchHistory" class="table-wrap"></div></div></section>
</section></main><footer>BNI BINGO Chapter · Traffic Light Performance Platform</footer>
<script>
const API='/api/bni';let token=localStorage.getItem('bni_token')||'',role=localStorage.getItem('bni_role')||'',data={batches:[],members:[]},currentReport=null,currentMember=null;
const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),color=l=>l==='green'?'#27934a':l==='yellow'?'#e1b322':l==='red'?'#e31b36':'#57575f',label=l=>({green:'綠燈',yellow:'黃燈',red:'紅燈',black:'黑燈'})[l]||l;
async function api(action,body={}){let r;try{r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json','x-bni-token':token},body:JSON.stringify({action,...body})})}catch{throw new Error('未能連接伺服器，請稍後再試。')}let j={};try{j=await r.json()}catch{}if(!r.ok)throw new Error(j.error||'操作失敗');return j}
$('togglePassword').onclick=()=>{const p=$('password'),show=p.type==='password';p.type=show?'text':'password';$('togglePassword').textContent=show?'隱藏':'顯示';$('togglePassword').setAttribute('aria-label',show?'隱藏密碼':'顯示密碼')};
$('loginBtn').onclick=async()=>{const b=$('loginBtn');b.disabled=true;b.textContent='登入中…';$('loginMsg').innerHTML='';try{const r=await api('login',{role:$('role').value,password:$('password').value});token=r.token;role=r.role;localStorage.setItem('bni_token',token);localStorage.setItem('bni_role',role);await enter()}catch(e){$('loginMsg').innerHTML='<div class="notice error">'+esc(e.message)+'</div>'}finally{b.disabled=false;b.textContent='登入'}};
$('password').addEventListener('keydown',e=>{if(e.key==='Enter')$('loginBtn').click()});$('logoutBtn').onclick=()=>{localStorage.clear();location.reload()};
async function enter(){data=await api('history');$('loginView').classList.add('hide');$('appView').classList.remove('hide');$('logoutBtn').classList.remove('hide');if(role==='admin')$('adminTab').classList.remove('hide');renderAll()}
$('memberTab').onclick=()=>{$('memberView').classList.remove('hide');$('adminView').classList.add('hide');$('memberTab').classList.add('on');$('adminTab').classList.remove('on')};$('adminTab').onclick=()=>{$('memberView').classList.add('hide');$('adminView').classList.remove('hide');$('adminTab').classList.add('on');$('memberTab').classList.remove('on');renderAdmin()};
function scoreRows(x){return[['培訓得分',x.training_score,10],['出席得分',x.absence_score,15],['準時得分',x.lateness_score,10],['一對一得分',x.one_to_one_score,10],['引薦得分',x.referral_score,20],['生意額得分',x.biz_give_score,15],['嘉賓得分',x.visitor_score,20]]}
function normalName(s){return String(s||'').normalize('NFKC').replace(/\s+/g,' ').trim().toLowerCase()}function memberHistory(name){const n=normalName(name);return data.batches.map(b=>({batch:b,score:data.members.find(m=>m.batch_id===b.id&&normalName(m.member_name)===n)})).filter(x=>x.score)}
function renderAll(){data.batches.sort((a,b)=>String(b.period_end).localeCompare(String(a.period_end)));renderOverview();if(role==='admin')renderAdmin()}
function renderOverview(){const b=data.batches[0],m=data.members.filter(x=>!b||x.batch_id===b.id);$('period').textContent=b?`${b.period_start} 至 ${b.period_end}`:'暫未有已發布報告';$('batchLabel').textContent=b?`${b.member_count} 位會員 · ${b.source_filename}`:'';const c={green:0,yellow:0,red:0,black:0};m.forEach(x=>c[x.light]++);$('kpis').innerHTML=['green','yellow','red','black'].map(x=>`<div class="kpi ${x}"><strong>${c[x]}</strong>${label(x)}</div>`).join('');window.latestMembers=m;renderList(m)}
function renderList(m){$('memberList').innerHTML=m.map(x=>`<button class="member"><span class="score">${x.total_score}</span><b>${esc(x.member_name)}</b><br><span class="pill" style="background:${color(x.light)}">${label(x.light)}</span></button>`).join('')||'<p class="muted">沒有會員紀錄</p>';[...$('memberList').querySelectorAll('.member')].forEach((b,i)=>b.onclick=()=>showMember(m[i]))}$('search').oninput=e=>renderList((window.latestMembers||[]).filter(x=>normalName(x.member_name).includes(normalName(e.target.value))));
function showMember(x){currentMember=x;const hist=memberHistory(x.member_name).map(({batch,score})=>`<div class="month"><small>${batch.period_end}</small><br><strong>${score.total_score}</strong><br><span class="pill" style="background:${color(score.light)}">${label(score.light)}</span></div>`).join('');$('detail').classList.remove('hide');$('detail').innerHTML=`<div class="detail-head"><div class="score-ring" style="background:${color(x.light)}">${x.total_score}</div><div><h2>${esc(x.member_name)}</h2><span class="pill" style="background:${color(x.light)}">${label(x.light)}</span></div></div><h3>分項得分</h3><div class="score-note">以下數字均為 Excel 正式得分。</div><div class="breakdown">${scoreRows(x).map(v=>`<div class="metric">${v[0]}<span>${v[1]||0}／${v[2]}</span></div>`).join('')}</div><h3>每月比較</h3><div class="history">${hist}</div><h3>改善建議</h3><ul class="tips">${(x.improvement_tips||[]).slice(0,3).map(t=>`<li>${esc(t)}</li>`).join('')||'<li>保持現有表現。</li>'}</ul>`;$('detail').scrollIntoView({behavior:'smooth'})}
function renderAdmin(){renderBatchHistory();renderTrendSelector()}function renderBatchHistory(){$('batchHistory').innerHTML=data.batches.length?`<table><tr><th>月份</th><th>會員數</th><th>Excel</th></tr>${data.batches.map(b=>`<tr><td>${b.period_end.slice(0,7)}</td><td>${b.member_count}</td><td>${esc(b.source_filename)}</td></tr>`).join('')}</table>`:'<p class="muted">未有月份紀錄。</p>'}function renderTrendSelector(){const names=[...new Map(data.members.map(m=>[normalName(m.member_name),m.member_name])).values()];$('trendMember').innerHTML='<option value="">請選擇會員</option>'+names.map(n=>`<option>${esc(n)}</option>`).join('')}$('trendMember').onchange=e=>renderTrend(e.target.value);function renderTrend(name){if(!name)return;$('trendView').innerHTML=memberHistory(name).map(({batch,score})=>`<div class="month"><b>${batch.period_end.slice(0,7)}</b>　${score.total_score}分　${label(score.light)}</div>`).join('')}
$('file').onchange=async e=>{const f=e.target.files[0];if(!f)return;try{const wb=XLSX.read(await f.arrayBuffer(),{type:'array'}),sheet=wb.Sheets[wb.SheetNames[0]],rows=XLSX.utils.sheet_to_json(sheet,{defval:'',raw:false});$('checkResult').innerHTML=`<div class="notice ok">已讀取 ${rows.length} 行資料。上載功能保留原有 Excel 欄位，正式發布前請核對。</div>`}catch(err){$('checkResult').innerHTML='<div class="notice error">'+esc(err.message)+'</div>'}};$('resetBtn').onclick=()=>location.reload();
if(token)enter().catch(()=>{localStorage.clear()});
</script>
<script src="precision_scoring.js?v=20260723e"></script><script src="ux_enhancements.js?v=20260723e"></script><script src="password_toggle.js?v=20260723e"></script>
</body></html>
