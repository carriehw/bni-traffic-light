<!doctype html>
<html lang="zh-HK">
<head>
<meta charset="utf-8">

<title>BNI BINGO 紅黃綠燈平台</title>

<style>
:root{--wine:#761538;--red:#e31b36;--green:#27934a;--yellow:#e1b322;--black:#57575f;--ink:#211b1e;--muted:#766d72;--line:#eadfe4;--bg:#f8f4f6}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"PingFang HK","Microsoft JhengHei",system-ui,sans-serif}button,input,select{font:inherit}header{background:#fff;border-bottom:3px solid var(--red);padding:10px 18px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:8}.logo{width:88px;height:66px;object-fit:contain}.brand b{display:block;font-size:18px}.brand span,.muted{font-size:12px;color:var(--muted)}.spacer{flex:1}.wrap{max-width:1080px;margin:auto;padding:18px}.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 8px #3810210b}.login{max-width:430px;margin:8vh auto}.field,.search{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;margin:8px 0}.btn{border:0;background:var(--wine);color:#fff;padding:11px 15px;border-radius:10px;font-weight:750;cursor:pointer}.btn.light{background:#fff;color:var(--wine);border:1px solid var(--wine)}.btn.danger{background:#9b1730}.wide{width:100%}.hide{display:none!important}.tabs,.row,.topline{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.tab{background:#fff;color:var(--wine);border:1px solid var(--line)}.tab.on{background:var(--wine);color:#fff}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.kpi{text-align:center;color:#fff;border-radius:13px;padding:13px}.kpi strong{font-size:25px;display:block}.green{background:var(--green)}.yellow{background:var(--yellow);color:#514000}.red{background:var(--red)}.black{background:var(--black)}.member-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.member{border:1px solid var(--line);background:#fff;border-radius:13px;padding:13px;cursor:pointer;text-align:left}.member .score{font-size:24px;font-weight:850;float:right}.pill{display:inline-block;color:#fff;border-radius:20px;padding:3px 9px;font-size:12px;font-weight:800}.delta.up{color:var(--green)}.delta.down{color:var(--red)}.detail-head{display:grid;grid-template-columns:auto 1fr;gap:15px;align-items:center}.score-ring{width:96px;height:96px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:31px;font-weight:900}.breakdown{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.metric{border:1px solid var(--line);border-radius:10px;padding:10px}.metric span{float:right;font-weight:850}.score-note{font-size:12px;color:var(--muted);background:#fbf8fa;border-radius:9px;padding:9px;margin:8px 0}.history{display:flex;gap:9px;overflow:auto}.month{min-width:150px;border:1px solid var(--line);border-radius:11px;padding:11px}.month strong{font-size:23px}.tips{padding-left:22px;line-height:1.7}.recap{white-space:pre-wrap;line-height:1.65;background:#fbf8fa;border:1px solid var(--line);padding:13px;border-radius:11px}.drop{border:2px dashed #cbbdc4;padding:22px;border-radius:13px;text-align:center}.notice{padding:11px;border-radius:10px;background:#fff7dc;color:#725600;margin:10px 0}.ok{background:#e7f6ec;color:#176b32}.error{background:#fde8eb;color:#8b1125}.info{background:#eef4ff;color:#244b82}.table-wrap{overflow:auto}table{border-collapse:collapse;width:100%;font-size:13px}th,td{padding:8px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}.member-card-canvas{display:block;width:100%;max-width:720px;height:auto;margin:14px auto;border:1px solid var(--line);border-radius:12px;background:#fff}.mode-box{border:1px solid var(--line);border-radius:12px;padding:13px;margin-top:12px}.mode-box strong{display:block;margin-bottom:4px}.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.trend-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}.trend-summary div{border:1px solid var(--line);border-radius:10px;padding:10px;text-align:center}.trend-summary strong{display:block;font-size:22px}.latest-tag{font-weight:800;color:var(--green)}footer{text-align:center;color:var(--muted);font-size:11px;padding:18px}
@media(max-width:760px){header{padding:9px 12px;gap:10px}.logo{width:66px;height:50px}.brand b{font-size:16px;line-height:1.25}.brand span{display:none}.btn{padding:10px 12px}.wrap{padding:12px}.member-grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.breakdown,.admin-grid{grid-template-columns:1fr}.detail-head{grid-template-columns:1fr}.score-ring{width:82px;height:82px}.trend-summary{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><img class="logo" src="bingo-logo.jpg"><div class="brand"><b>BNI BINGO 紅黃綠燈平台</b><span>會員月度表現、改善建議及分享圖卡</span></div><div class="spacer"></div><button id="logoutBtn" class="btn light hide">登出</button></header>
<main class="wrap">
<section id="loginView" class="card login"><h1>登入平台</h1><p class="muted">會員可查看個人及分會表現；LT 可上載、檢查及發布每月 Excel。</p><select id="role" class="field"><option value="member">會員登入</option><option value="admin">LT 管理員登入</option></select><input id="password" class="field" type="password" placeholder="請輸入密碼"><button id="loginBtn" class="btn wide">登入</button><div id="loginMsg"></div></section>
<section id="appView" class="hide">
<div class="tabs"><button id="memberTab" class="btn tab on">會員平台</button><button id="adminTab" class="btn tab hide">LT 管理</button></div>
<section id="memberView"><div class="card"><div class="topline"><div><h2>分會表現總覽</h2><div id="period" class="muted"></div></div><div class="spacer"></div><div id="batchLabel" class="muted"></div></div><div id="kpis" class="kpis"></div></div><div class="card"><input id="search" class="search" placeholder="搜尋會員姓名"><div id="memberList" class="member-grid"></div></div><div id="detail" class="card hide"></div></section>
<section id="adminView" class="hide">
<div class="admin-grid">
<div class="card"><h2>上載及檢查 Excel</h2><div class="drop"><input id="file" type="file" accept=".xlsx,.xls"><p class="muted">正式分數以 Excel 為準。系統只負責讀取、保存及按月份排列。</p></div><div id="checkResult"></div><div id="publishMode" class="mode-box hide"></div><div class="row"><button id="publishBtn" class="btn hide">確認發布</button><button id="resetBtn" class="btn light hide">取消上載</button><button id="downloadZipBtn" class="btn light hide">下載全部會員圖卡 ZIP</button><button id="downloadCsvBtn" class="btn light hide">下載 Manifest CSV</button></div></div>
<div class="card"><h2>會員月份表現變化</h2><p class="muted">選擇會員後，可查看各月份總分、燈號及七項得分。所有數字均忠實來自當月 Excel。</p><select id="trendMember" class="field"><option value="">請選擇會員</option></select><div id="trendView"><p class="muted">請先選擇會員。</p></div></div>
</div>
<div id="preview" class="card hide"></div>
<div class="card"><h2>月份紀錄</h2><div id="batchHistory" class="table-wrap"></div></div>
</section>
</section>
</main>
<footer>BNI BINGO Chapter · Traffic Light Performance Platform</footer>
<script src="vendor_jszip.min.js"></script>
<script>
const API='https://qyufbsvrophwzcwlkppv.supabase.co/functions/v1/bni-api';
let token=localStorage.getItem('bni_token')||'',role=localStorage.getItem('bni_role')||'',data={batches:[],members:[]},currentReport=null,sourceBase64=null,currentMember=null,publishMode='latest';
const $=id=>document.getElementById(id),color=l=>l==='green'?'#27934a':l==='yellow'?'#e1b322':l==='red'?'#e31b36':'#57575f',label=l=>({green:'綠燈',yellow:'黃燈',red:'紅燈',black:'黑燈'})[l]||l,esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function api(action,body={}){const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json','x-bni-token':token},body:JSON.stringify({action,...body})});const j=await r.json();if(!r.ok){const e=new Error(j.error||'操作失敗');e.code=j.code;e.payload=j;throw e}return j}
$('loginBtn').onclick=async()=>{try{const r=await api('login',{role:$('role').value,password:$('password').value});token=r.token;role=r.role;localStorage.setItem('bni_token',token);localStorage.setItem('bni_role',role);await enter()}catch(e){$('loginMsg').innerHTML='<div class="notice error">'+esc(e.message)+'</div>'}};
$('logoutBtn').onclick=async()=>{try{await api('logout')}catch{}localStorage.clear();location.reload()};
async function enter(){try{data=await api('history');$('loginView').classList.add('hide');$('appView').classList.remove('hide');$('logoutBtn').classList.remove('hide');if(role==='admin')$('adminTab').classList.remove('hide');renderAll()}catch(e){localStorage.clear();$('loginMsg').innerHTML='<div class="notice error">'+esc(e.message)+'</div>'}}
$('memberTab').onclick=()=>{$('memberView').classList.remove('hide');$('adminView').classList.add('hide');$('memberTab').classList.add('on');$('adminTab').classList.remove('on')};
$('adminTab').onclick=()=>{$('memberView').classList.add('hide');$('adminView').classList.remove('hide');$('adminTab').classList.add('on');$('memberTab').classList.remove('on');renderAdmin()};
function deltaText(x){if(x.previous_score===null||x.previous_score===undefined)return'';const d=Number(x.total_score)-Number(x.previous_score);return `<span class="delta ${d>=0?'up':'down'}">${d>=0?'+':''}${d}</span>`}
function renderAll(){data.batches.sort((a,b)=>String(b.period_end).localeCompare(String(a.period_end)));renderOverview();if(role==='admin')renderAdmin()}
function renderOverview(){const b=data.batches[0],m=data.members.filter(x=>!b||x.batch_id===b.id);$('period').textContent=b?`${b.period_start} 至 ${b.period_end}`:'暫未有已發布報告';$('batchLabel').textContent=b?`${b.member_count} 位會員 · ${b.source_filename}`:'';const c={green:0,yellow:0,red:0,black:0};m.forEach(x=>c[x.light]++);$('kpis').innerHTML=['green','yellow','red','black'].map(x=>`<div class="kpi ${x}"><strong>${c[x]}</strong>${label(x)}</div>`).join('');window.latestMembers=m;renderList(m)}
function renderList(m){$('memberList').innerHTML=m.map(x=>`<button class="member"><span class="score">${x.total_score}</span><b>${esc(x.member_name)}</b><br><span class="pill" style="background:${color(x.light)}">${label(x.light)}</span> ${deltaText(x)}</button>`).join('')||'<p class="muted">沒有會員紀錄</p>';[...$('memberList').querySelectorAll('.member')].forEach((b,i)=>b.onclick=()=>showMember(m[i]))}
$('search').oninput=e=>{const q=e.target.value.trim().toLowerCase();renderList((window.latestMembers||[]).filter(x=>String(x.member_name).toLowerCase().includes(q)))};
function scoreRows(x){return[['培訓得分',x.training_score,10],['出席得分',x.absence_score,15],['準時得分',x.lateness_score,10],['一對一得分',x.one_to_one_score,10],['引薦得分',x.referral_score,20],['生意額得分',x.biz_give_score,15],['嘉賓得分',x.visitor_score,20]]}
function normalName(s){return String(s||'').normalize('NFKC').replace(/\s+/g,' ').trim().toLowerCase()}
function memberHistory(name){const n=normalName(name);return data.batches.map(b=>({batch:b,score:data.members.find(m=>m.batch_id===b.id&&normalName(m.member_name)===n)})).filter(x=>x.score)}
function showMember(x){if(!x)return;currentMember=x;const hist=memberHistory(x.member_name).map(({batch,score})=>`<div class="month"><small>${batch.period_end}</small><br><strong>${score.total_score}</strong><br><span class="pill" style="background:${color(score.light)}">${label(score.light)}</span></div>`).join('');$('detail').classList.remove('hide');$('detail').innerHTML=`<div class="detail-head"><div class="score-ring" style="background:${color(x.light)}">${x.total_score}</div><div><h2>${esc(x.member_name)}</h2><span class="pill" style="background:${color(x.light)}">${label(x.light)}</span> ${deltaText(x)}</div></div><h3>分項得分</h3><div class="score-note">以下數字均為得分，並非缺席、遲到或活動次數。</div><div class="breakdown">${scoreRows(x).map(v=>`<div class="metric">${v[0]}<span>${v[1]||0}／${v[2]}</span></div>`).join('')}</div><h3>每月比較</h3><div class="history">${hist}</div><h3>改善建議</h3><ul class="tips">${(x.improvement_tips||[]).slice(0,3).map(t=>`<li>${esc(t)}</li>`).join('')||'<li>保持現有表現，持續建立高質素引薦習慣。</li>'}</ul><h3>本月回顧</h3><div class="recap">${esc(x.recap_text||'')}</div><canvas id="memberCard" class="member-card-canvas"></canvas><div class="row" style="justify-content:center"><button class="btn" onclick="downloadCurrentCard()">下載會員圖卡</button></div>`;drawCard(x);$('detail').scrollIntoView({behavior:'smooth'})}
function splitLines(ctx,text,max){const lines=[];for(const para of String(text||'').split('\n')){let row='';for(const ch of para){if(ctx.measureText(row+ch).width>max&&row){lines.push(row);row=ch}else row+=ch}if(row)lines.push(row);if(!para)lines.push('')}return lines}
function cardSummary(x){const tips=(x.improvement_tips||[]).slice(0,3);return{tips,summary:`本月總分 ${x.total_score} 分（${label(x.light)}）。${tips.length?'建議下月優先完成以上三項行動，逐步提升整體表現。':'保持穩定表現，繼續累積高質素引薦及合作成果。'}`}}
function drawCard(x,canvas=$('memberCard')){if(!canvas)return;const tmp=canvas.getContext('2d'),info=cardSummary(x);tmp.font='29px sans-serif';const tipLines=info.tips.flatMap(t=>splitLines(tmp,'• '+t,1020));tmp.font='28px sans-serif';const recapLines=splitLines(tmp,info.summary,1020);const h=Math.max(1500,1110+tipLines.length*46+recapLines.length*44+210);canvas.width=1200;canvas.height=h;const ctx=canvas.getContext('2d'),bg=ctx.createLinearGradient(0,0,1200,h);bg.addColorStop(0,'#fff');bg.addColorStop(1,'#f7eef2');ctx.fillStyle=bg;ctx.fillRect(0,0,1200,h);ctx.fillStyle='#761538';ctx.fillRect(0,0,1200,160);ctx.fillStyle='#fff';ctx.font='bold 50px sans-serif';ctx.fillText('BNI BINGO 會員月度表現',70,98);ctx.fillStyle='#211b1e';ctx.font='bold 58px sans-serif';ctx.fillText(x.member_name,70,255);ctx.fillStyle=color(x.light);ctx.beginPath();ctx.arc(205,455,125,0,Math.PI*2);ctx.fill();ctx.fillStyle=x.light==='yellow'?'#514000':'#fff';ctx.textAlign='center';ctx.font='bold 92px sans-serif';ctx.fillText(x.total_score,205,490);ctx.font='bold 31px sans-serif';ctx.fillText(label(x.light),205,545);ctx.textAlign='left';ctx.fillStyle='#211b1e';ctx.font='bold 34px sans-serif';ctx.fillText('分項得分',410,365);ctx.font='26px sans-serif';ctx.fillStyle='#766d72';ctx.fillText('以下為得分，並非事件次數',410,405);ctx.fillStyle='#211b1e';ctx.font='28px sans-serif';scoreRows(x).forEach((v,j)=>ctx.fillText(`${v[0]}：${v[1]||0}／${v[2]}`,410,465+j*55));let y=850;ctx.fillStyle='#761538';ctx.font='bold 37px sans-serif';ctx.fillText('三大改善重點',70,y);y+=60;ctx.fillStyle='#211b1e';ctx.font='29px sans-serif';tipLines.forEach(line=>{ctx.fillText(line,70,y);y+=46});y+=35;ctx.fillStyle='#761538';ctx.font='bold 37px sans-serif';ctx.fillText('本月摘要',70,y);y+=62;ctx.fillStyle='#211b1e';ctx.font='28px sans-serif';recapLines.forEach(line=>{ctx.fillText(line,70,y);y+=44});const footerY=h-65;ctx.strokeStyle='#ded2d8';ctx.beginPath();ctx.moveTo(70,footerY-45);ctx.lineTo(1130,footerY-45);ctx.stroke();ctx.fillStyle='#766d72';ctx.font='23px sans-serif';ctx.fillText('BNI BINGO Chapter · Traffic Light Performance Platform',70,footerY)}
function downloadCanvas(c,n){const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download=n;a.click()}function safeName(s){return String(s).replace(/[\\/:*?"<>|]/g,'_')}function downloadCurrentCard(){if(currentMember)downloadCanvas($('memberCard'),safeName(currentMember.member_name)+'-traffic-light.png')}
function fileBase64(f){return new Promise((ok,no)=>{const r=new FileReader();r.onload=()=>ok(String(r.result).split(',')[1]);r.onerror=no;r.readAsDataURL(f)})}
function normaliseLight(v,s){v=String(v).toLowerCase();if(v.includes('綠')||v.includes('green'))return'green';if(v.includes('黃')||v.includes('yellow'))return'yellow';if(v.includes('紅')||v.includes('red'))return'red';if(v.includes('黑')||v.includes('black'))return'black';return s>=70?'green':s>=50?'yellow':s>=30?'red':'black'}
function makeTips(m){const t=[];if(m.referral_score<10)t.push('增加精準引薦，優先了解會友理想客戶。');if(m.visitor_score<5)t.push('邀請一位合適嘉賓，為分會增加新商機。');if(m.one_to_one_score<5)t.push('安排一至兩次一對一，加深合作理解。');if(m.training_score<5)t.push('完成一次培訓，提升轉介及跟進效率。');return t.slice(0,3)}
function makeRecap(m){return`${m.member_name} 本月總分為 ${m.total_score}，屬於${label(m.light)}表現。建議下月集中處理最重要的三項行動，逐步提升整體表現。`}
function monthEnd(y,m){return new Date(Date.UTC(Number(y),Number(m),0)).getUTCDate()}
function detectPeriod(filename){const d=filename.match(/(20\d{2})[-_ ]?(\d{1,2})/);if(!d)return null;const y=d[1],m=String(d[2]).padStart(2,'0'),day=String(monthEnd(y,m)).padStart(2,'0');return{start:`${y}-${m}-01`,end:`${y}-${m}-${day}`}}
function assessPublishMode(){if(!currentReport)return;const same=data.batches.find(b=>b.period_end===currentReport.period_end),latest=data.batches[0];if(same)publishMode='replace';else if(!latest||currentReport.period_end>latest.period_end)publishMode='latest';else publishMode='history';const box=$('publishMode');box.classList.remove('hide');if(publishMode==='replace'){box.innerHTML=`<strong>偵測到相同月份：${currentReport.period_end.slice(0,7)}</strong>確認後會取代該月份所有會員資料；其他月份不受影響。`;box.className='mode-box notice error';$('publishBtn').textContent=`取代 ${currentReport.period_end.slice(0,7)} 資料`;void 0}else if(publishMode==='history'){box.innerHTML=`<strong>偵測到舊月份：${currentReport.period_end.slice(0,7)}</strong>發布後只會加入歷史紀錄，不會取代現時最新月份。`;box.className='mode-box notice info';$('publishBtn').textContent='加入歷史紀錄'}else{box.innerHTML=`<strong>新月份：${currentReport.period_end.slice(0,7)}</strong>發布後會成為最新月份，較早月份自動保留為歷史。`;box.className='mode-box notice ok';$('publishBtn').textContent='發布為最新月份'}}
$('file').onchange=async e=>{const f=e.target.files[0];if(!f)return;try{sourceBase64=await fileBase64(f);const wb=XLSX.read(await f.arrayBuffer(),{type:'array'}),sheet=wb.Sheets[wb.SheetNames[0]],rows=XLSX.utils.sheet_to_json(sheet,{defval:'',raw:false}),keys=rows.length?Object.keys(rows[0]):[],find=ts=>keys.find(k=>ts.some(t=>k.toLowerCase().includes(t))),map={member_name:find(['member','會員','姓名','name']),total_score:find(['total','總分','score']),light:find(['light','燈']),training_score:find(['training','培訓']),absence_score:find(['absence','缺席']),lateness_score:find(['late','遲到']),one_to_one_score:find(['one to one','1-2-1','一對一']),referral_score:find(['referral','引薦']),biz_give_score:find(['biz','生意']),visitor_score:find(['visitor','嘉賓'])},errors=[],warnings=[];if(!rows.length)errors.push('Excel 沒有可讀取資料');if(!map.member_name)errors.push('找不到會員姓名欄');if(!map.total_score)errors.push('找不到總分欄');const period=detectPeriod(f.name);if(!period)errors.push('檔案名稱未能辨認月份，請使用例如 Traffic_2026-07.xlsx');const members=rows.filter(r=>String(r[map.member_name]||'').trim()).map(r=>{const m={};for(const[k,v]of Object.entries(map))m[k]=v?r[v]:'';m.member_name=String(m.member_name).trim();['total_score','training_score','absence_score','lateness_score','one_to_one_score','referral_score','biz_give_score','visitor_score'].forEach(k=>m[k]=Number(String(m[k]||0).replace(/,/g,''))||0);m.light=normaliseLight(m.light,m.total_score);m.previous_score=null;m.improvement_tips=makeTips(m);m.recap_text=makeRecap(m);m.raw_metrics=r;return m});const dup=members.map(m=>normalName(m.member_name)).filter((n,i,a)=>a.indexOf(n)!==i);if(dup.length)errors.push('Excel 內有重複會員姓名');members.forEach(m=>{const sum=scoreRows(m).reduce((n,v)=>n+Number(v[1]||0),0);if(sum!==m.total_score)warnings.push(`${m.member_name}：分項合計 ${sum}，Excel 總分 ${m.total_score}`)});currentReport=period?{period_start:period.start,period_end:period.end,source_filename:f.name,members}:null;$('checkResult').innerHTML=(errors.length?'<div class="notice error">'+errors.join('<br>')+'</div>':'<div class="notice ok">讀取完成。正式得分將忠實按 Excel 發布。</div>')+(warnings.length?'<div class="notice">提示：以下分項合計與 Excel 總分不同，網站仍以 Excel 欄位為準。<br>'+warnings.slice(0,30).join('<br>')+'</div>':'');$('publishBtn').classList.toggle('hide',!!errors.length);$('resetBtn').classList.remove('hide');$('downloadZipBtn').classList.remove('hide');$('downloadCsvBtn').classList.remove('hide');$('preview').classList.remove('hide');$('preview').innerHTML=`<h2>上載預覽</h2><p><b>檔案：</b>${esc(f.name)}　<b>月份：</b>${period?period.end.slice(0,7):'未能辨認'}　<b>會員：</b>${members.length}</p><div class="table-wrap"><table><tr><th>會員</th><th>總分</th><th>燈號</th></tr>${members.map(m=>`<tr><td>${esc(m.member_name)}</td><td>${m.total_score}</td><td>${label(m.light)}</td></tr>`).join('')}</table></div>`;if(!errors.length)assessPublishMode()}catch(err){$('checkResult').innerHTML='<div class="notice error">'+esc(err.message)+'</div>'}}
$('resetBtn').onclick=()=>{currentReport=null;sourceBase64=null;$('file').value='';$('checkResult').innerHTML='';$('preview').classList.add('hide');$('publishMode').classList.add('hide');['publishBtn','resetBtn','downloadZipBtn','downloadCsvBtn'].forEach(id=>$(id).classList.add('hide'))};
$('publishBtn').onclick=async()=>{if(!currentReport)return;if(publishMode==='replace'&&!confirm(`確認取代 ${currentReport.period_end.slice(0,7)} 全部會員資料？其他月份不受影響。`))return;try{const r=await api('publish',{report:currentReport,source_file_base64:sourceBase64,replace_existing:publishMode==='replace'});const msg=r.mode==='history'?'已加入歷史紀錄':r.mode==='replaced'?'已取代該月份資料':'已發布為最新月份';$('checkResult').innerHTML=`<div class="notice ok">${msg}：${r.period_end.slice(0,7)}，共 ${r.member_count} 位會員。</div>`;data=await api('history');renderAll()}catch(e){$('checkResult').innerHTML='<div class="notice error">'+esc(e.message)+'</div>'}};
function renderAdmin(){renderBatchHistory();renderTrendSelector()}
function renderBatchHistory(){$('batchHistory').innerHTML=data.batches.length?`<table><tr><th>月份</th><th>狀態</th><th>會員數</th><th>Excel</th><th>發布時間</th></tr>${data.batches.map((b,i)=>`<tr><td>${b.period_end.slice(0,7)}</td><td>${i===0?'<span class="latest-tag">最新</span>':'歷史'}</td><td>${b.member_count}</td><td>${esc(b.source_filename)}</td><td>${b.published_at?new Date(b.published_at).toLocaleString('zh-HK'):''}</td></tr>`).join('')}</table>`:'<p class="muted">未有月份紀錄。</p>'}
function renderTrendSelector(){const names=[...new Map(data.members.map(m=>[normalName(m.member_name),m.member_name])).values()].sort((a,b)=>a.localeCompare(b,'zh-HK'));const old=$('trendMember').value;$('trendMember').innerHTML='<option value="">請選擇會員</option>'+names.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join('');if(names.includes(old))$('trendMember').value=old;if(old)renderTrend(old)}
$('trendMember').onchange=e=>renderTrend(e.target.value);
function renderTrend(name){if(!name){$('trendView').innerHTML='<p class="muted">請先選擇會員。</p>';return}const hist=memberHistory(name);if(!hist.length){$('trendView').innerHTML='<p class="muted">找不到紀錄。</p>';return}const latest=hist[0].score,oldest=hist[hist.length-1].score,diff=Number(latest.total_score)-Number(oldest.total_score);$('trendView').innerHTML=`<div class="trend-summary"><div><span class="muted">最新分數</span><strong>${latest.total_score}</strong></div><div><span class="muted">最早分數</span><strong>${oldest.total_score}</strong></div><div><span class="muted">期間變化</span><strong class="delta ${diff>=0?'up':'down'}">${diff>=0?'+':''}${diff}</strong></div></div><div class="table-wrap"><table><tr><th>月份</th><th>總分</th><th>燈號</th><th>培訓</th><th>出席</th><th>準時</th><th>1-2-1</th><th>引薦</th><th>生意額</th><th>嘉賓</th></tr>${hist.map(({batch,score})=>`<tr><td>${batch.period_end.slice(0,7)}</td><td><b>${score.total_score}</b></td><td><span class="pill" style="background:${color(score.light)}">${label(score.light)}</span></td>${scoreRows(score).map(v=>`<td>${v[1]||0}</td>`).join('')}</tr>`).join('')}</table></div>`}
$('downloadZipBtn').onclick=async()=>{if(!currentReport)return;const zip=new JSZip(),folder=zip.folder('member-cards'),manifest=[];for(const m of currentReport.members){const c=document.createElement('canvas');drawCard(m,c);const blob=await new Promise(ok=>c.toBlob(ok,'image/png')),fn=safeName(m.member_name)+'-traffic-light.png';folder.file(fn,blob);manifest.push({member_name:m.member_name,total_score:m.total_score,light:label(m.light),filename:fn})}zip.file('manifest.csv',toCsv(manifest));const out=await zip.generateAsync({type:'blob'}),a=document.createElement('a');a.href=URL.createObjectURL(out);a.download='BNI-BINGO-member-cards.zip';a.click()};
$('downloadCsvBtn').onclick=()=>{if(!currentReport)return;const rows=currentReport.members.map(m=>({會員:m.member_name,總分:m.total_score,燈號:label(m.light)})),a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+toCsv(rows)],{type:'text/csv'}));a.download='member-card-manifest.csv';a.click()};
function toCsv(rows){if(!rows.length)return'';const ks=Object.keys(rows[0]),q=v=>'"'+String(v??'').replace(/"/g,'""')+'"';return[ks.map(q).join(','),...rows.map(r=>ks.map(k=>q(r[k])).join(','))].join('\n')}
