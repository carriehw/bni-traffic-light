name: Deploy Cloudflare V3

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: cloudflare-production
    defaults:
      run:
        working-directory: cloudflare
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare/package.json
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run sync:assets

      # First deployment provisions the Worker and draft D1/R2 bindings.
      - run: npx wrangler deploy
      - run: npx wrangler d1 migrations apply DB --remote

      - name: Set member password
        run: printf '%s' "$MEMBER_PASSWORD" | npx wrangler secret put MEMBER_PASSWORD
        env:
          MEMBER_PASSWORD: ${{ secrets.MEMBER_PASSWORD }}
      - name: Set LT password
        run: printf '%s' "$ADMIN_PASSWORD" | npx wrangler secret put ADMIN_PASSWORD
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - run: npx wrangler deploy
      - name: Deployment handoff note
        run: |
          echo 'Cloudflare deployment completed.'
          echo 'Run the private one-time D1 data import locally, then verify /health and the acceptance checklist.'
