name: Deploy Cloudflare V3

on:
  workflow_dispatch:
    inputs:
      run_data_import:
        description: 'Import cloudflare/tmp/import-d1.sql after migrations'
        type: boolean
        required: true
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: cloudflare-production
    defaults:
      run:
        working-directory: cloudflare
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare/package.json
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run sync:assets

      # First deployment provisions the Worker and draft D1/R2 bindings.
      - run: npx wrangler deploy
      - run: npx wrangler d1 migrations apply DB --remote

      - name: Set member password
        run: printf '%s' "$MEMBER_PASSWORD" | npx wrangler secret put MEMBER_PASSWORD
        env:
          MEMBER_PASSWORD: ${{ secrets.MEMBER_PASSWORD }}
      - name: Set LT password
        run: printf '%s' "$ADMIN_PASSWORD" | npx wrangler secret put ADMIN_PASSWORD
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Import migrated data
        if: ${{ inputs.run_data_import }}
        run: |
          test -f tmp/import-d1.sql || (echo 'tmp/import-d1.sql is missing' && exit 1)
          npx wrangler d1 execute DB --remote --file=tmp/import-d1.sql

      - run: npx wrangler deploy
      - name: Verify health endpoint
        run: |
          URL=$(npx wrangler deployments status --json | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{const j=JSON.parse(s);console.log(j.url||'')}catch{console.log('')}})")
          echo "Deployment completed. Verify /health in the Cloudflare dashboard or deployment URL."
