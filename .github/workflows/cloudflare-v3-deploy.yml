name: Deploy Cloudflare V3

on:
  workflow_dispatch:
  push:
    branches:
      - cloudflare-v3
    paths:
      - 'cloudflare/**'
      - '.github/workflows/cloudflare-v3-deploy.yml'

permissions:
  contents: read

concurrency:
  group: cloudflare-v3-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: cloudflare-production
    defaults:
      run:
        working-directory: cloudflare
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cloudflare-v3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare/package.json

      - name: Validate protected deployment secrets
        env:
          MEMBER_PASSWORD: ${{ secrets.MEMBER_PASSWORD }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          node - <<'NODE'
          const required = ['CLOUDFLARE_API_TOKEN', 'CLOUDFLARE_ACCOUNT_ID', 'MEMBER_PASSWORD', 'ADMIN_PASSWORD'];
          const missing = required.filter(name => !process.env[name]);
          if (missing.length) {
            console.error(`Missing GitHub environment secrets: ${missing.join(', ')}`);
            process.exit(1);
          }
          console.log('All protected deployment secrets are present.');
          NODE

      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run sync:assets

      - name: Export current production data privately
        env:
          SOURCE_URL: https://bni-traffic-light-eta.vercel.app
          SOURCE_ROLE: admin
          SOURCE_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: npm run export:current -- ./tmp/current-history.json

      - name: Generate idempotent D1 import
        run: npm run make:import -- ./tmp/current-history.json ./tmp/import-d1.sql

      - name: Deploy and automatically provision D1 and R2
        run: |
          mkdir -p tmp
          WRANGLER_OUTPUT_FILE_PATH="$PWD/tmp/initial-deploy.ndjson" \
            npx wrangler deploy 2>&1 | tee tmp/initial-deploy.log

      - name: Apply D1 schema
        run: npx wrangler d1 migrations apply DB --remote

      - name: Import current batches and member scores
        run: npx wrangler d1 execute DB --remote --file=./tmp/import-d1.sql

      - name: Set member password
        env:
          MEMBER_PASSWORD: ${{ secrets.MEMBER_PASSWORD }}
        run: printf '%s' "$MEMBER_PASSWORD" | npx wrangler secret put MEMBER_PASSWORD

      - name: Set LT password
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: printf '%s' "$ADMIN_PASSWORD" | npx wrangler secret put ADMIN_PASSWORD

      - name: Final Cloudflare deployment
        id: final_deploy
        run: |
          WRANGLER_OUTPUT_FILE_PATH="$PWD/tmp/final-deploy.ndjson" \
            npx wrangler deploy 2>&1 | tee tmp/final-deploy.log
          URL=$(grep -Eo 'https://[A-Za-z0-9._-]+\.workers\.dev' tmp/final-deploy.log | tail -1 || true)
          if [ -z "$URL" ] && [ -f tmp/final-deploy.ndjson ]; then
            URL=$(node - <<'NODE'
          const fs = require('fs');
          const text = fs.readFileSync('tmp/final-deploy.ndjson', 'utf8');
          const urls = text.match(/https:\/\/[A-Za-z0-9._-]+\.workers\.dev/g) || [];
          console.log(urls.at(-1) || '');
          NODE
            )
          fi
          if [ -z "$URL" ]; then
            echo 'Unable to determine the workers.dev deployment URL.' >&2
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Cloudflare staging URL: $URL"

      - name: Verify health, logins and complete migrated dataset
        env:
          DEPLOYMENT_URL: ${{ steps.final_deploy.outputs.url }}
          MEMBER_PASSWORD: ${{ secrets.MEMBER_PASSWORD }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const source = JSON.parse(fs.readFileSync('./tmp/current-history.json', 'utf8'));
          const base = process.env.DEPLOYMENT_URL.replace(/\/$/, '');
          const post = async (body, token = '') => {
            const response = await fetch(`${base}/api/bni`, {
              method: 'POST',
              headers: { 'content-type': 'application/json', ...(token ? { 'x-bni-token': token } : {}) },
              body: JSON.stringify(body)
            });
            const text = await response.text();
            let json;
            try { json = JSON.parse(text); } catch { json = { raw: text }; }
            if (!response.ok) throw new Error(`${body.action} failed: ${response.status} ${JSON.stringify(json)}`);
            return json;
          };
          const normalize = value => String(value || '').normalize('NFKC').replace(/\s+/g, ' ').trim().toLowerCase();
          const officialKeys = [
            'total_score', 'light', 'training_score', 'absence_score', 'lateness_score',
            'one_to_one_score', 'referral_score', 'biz_give_score', 'visitor_score'
          ];
          const main = async () => {
            const healthResponse = await fetch(`${base}/health`, { cache: 'no-store' });
            const health = await healthResponse.json();
            if (!healthResponse.ok || health.ok !== true) throw new Error(`Health check failed: ${JSON.stringify(health)}`);

            const memberLogin = await post({ action: 'login', role: 'member', password: process.env.MEMBER_PASSWORD });
            const adminLogin = await post({ action: 'login', role: 'admin', password: process.env.ADMIN_PASSWORD });
            await post({ action: 'history' }, memberLogin.token);
            const target = await post({ action: 'history' }, adminLogin.token);

            if (target.batches.length !== source.batches.length) {
              throw new Error(`Batch count mismatch: source ${source.batches.length}, Cloudflare ${target.batches.length}`);
            }
            if (target.members.length !== source.members.length) {
              throw new Error(`Member row mismatch: source ${source.members.length}, Cloudflare ${target.members.length}`);
            }

            const sourceBatches = new Map(source.batches.map(x => [x.id, x]));
            for (const batch of target.batches) {
              const expected = sourceBatches.get(batch.id);
              if (!expected || expected.period_end !== batch.period_end || Number(expected.member_count) !== Number(batch.member_count)) {
                throw new Error(`Batch mismatch for ${batch.id}`);
              }
            }

            const key = row => `${row.batch_id}|${normalize(row.member_name)}`;
            const sourceMembers = new Map(source.members.map(row => [key(row), row]));
            for (const row of target.members) {
              const expected = sourceMembers.get(key(row));
              if (!expected) throw new Error(`Unexpected Cloudflare member row: ${key(row)}`);
              for (const field of officialKeys) {
                if (String(expected[field] ?? '') !== String(row[field] ?? '')) {
                  throw new Error(`Mismatch ${key(row)} ${field}: source=${expected[field]} target=${row[field]}`);
                }
              }
            }
            console.log(`Acceptance passed: ${target.batches.length} batches, ${target.members.length} member rows, member/admin login and health endpoint.`);
          };
          main().catch(error => { console.error(error); process.exit(1); });
          NODE

      - name: Remove private migration files
        if: always()
        run: rm -rf ./tmp

      - name: Deployment summary
        if: success()
        run: |
          echo 'Cloudflare V3 staging deployment and current-data migration passed.'
          echo 'The existing Vercel + Supabase production URL has not been switched yet.'