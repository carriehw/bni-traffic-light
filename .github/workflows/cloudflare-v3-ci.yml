name: Cloudflare V3 CI

on:
  push:
    branches: [cloudflare-v3]
    paths:
      - 'cloudflare/**'
      - 'tests/**'
      - '.github/workflows/cloudflare-v3-ci.yml'
  pull_request:
    paths:
      - 'cloudflare/**'
      - 'tests/**'
      - '.github/workflows/cloudflare-v3-ci.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare/package.json
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run dry-run
